name: Update BTC HMM Regime

on:
  schedule:
    # Pre-market: 08:00 ET = 12:00 UTC
    - cron: "0 12 * * 1-5"
    # Post-close: 16:30 ET = 20:30 UTC
    - cron: "30 20 * * 1-5"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-hmm:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies (speeds up runs)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Run HMM script
      - name: Generate HMM output
        run: python generate_hmm.py

      # ── 6. Commit and push updated JSON
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hmm_output.json
          # Only commit if file changed
          git diff --staged --quiet || git commit -m "chore: update HMM regime data [skip ci]"
          git push
