name: Update BTC HMM Regime

on:
  schedule:
    - cron: "0 12 * * 1-5"
    - cron: "30 20 * * 1-5"
  workflow_dispatch:

jobs:
  update-hmm:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance hmmlearn scikit-learn numpy pandas

      - name: Generate HMM output
        run: python generate_hmm.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hmm_output.json
          git diff --staged --quiet || git commit -m "chore: update HMM regime data [skip ci]"
          git push
